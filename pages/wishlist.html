<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist — Roots</title>
    <link rel="stylesheet" href="../styles/styles.css" />
    <link rel="stylesheet" href="../styles/cart.css" />
</head>
<body>
    <header class="header">
        <div class="header-brand">
            <h3><a href="index.html">Roots</a></h3>
        </div>
        <input type="checkbox" id="nav-toggle" class="nav-toggle">
        <label for="nav-toggle" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </label>
        <nav class="links">
            <a href="index.html">Home</a>
            <a href="produce_products.html">Products</a>
            <a href="newsletter.html">Newsletter</a>
            <a href="about_us.html">About Us</a>
            <a href="contact_us.html">Contact Us</a>
            <a href="wishlist.html">Wishlist</a>
            <a href="cart.html">Shopping Cart</a>
        </nav>
    </header>

    <div class="page-container">

        <div class="page-title-card">
            <h1>My Wishlist</h1>
        </div>

        <div id="wishlistItems" class="item-list"></div>

        <div class="wishlist-footer" id="wishlistFooter" style="display:none;">
            <a href="cart.html" class="btn btn-primary">View Cart →</a>
        </div>

    </div>

    <script src="../scripts/scripts.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        renderWishlist();
    });

    function renderWishlist() {
        const wishlist  = getWishlist();
        const container = document.getElementById('wishlistItems');
        const footer    = document.getElementById('wishlistFooter');

        if (wishlist.length === 0) {
            footer.style.display = 'none';
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">★</div>
                    <p>Your wishlist is empty.</p>
                    <a href="produce_products.html" class="btn btn-primary">Browse Products</a>
                </div>`;
            return;
        }

        footer.style.display = 'flex';
        container.innerHTML = wishlist.map(item => `
            <div class="item-card">
                <div class="item-info">
                    <span class="item-name">${item.name}</span>
                    <span class="item-unit-price">R${parseFloat(item.price).toFixed(2)}</span>
                </div>
                <div class="item-controls wishlist-controls">
                    <button class="btn btn-primary btn-sm"
                        onclick="moveToCart('${item.id}', '${item.name}', ${item.price}, this)">
                        Add to Cart
                    </button>
                    <button class="remove-btn" onclick="removeFromWishlist('${item.id}')" title="Remove">✕</button>
                </div>
            </div>`
        ).join('');
    }

    function removeFromWishlist(id) {
        saveWishlist(getWishlist().filter(item => item.id !== id));
        renderWishlist();
    }

    function moveToCart(id, name, price, btn) {
        addToCart(id, name, price);
        btn.textContent = '✓ Added!';
        btn.style.backgroundColor = '#015005';
        setTimeout(() => {
            removeFromWishlist(id);
        }, 800);
    }
    </script>
</body>
</html>
