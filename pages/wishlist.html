<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Wishlist — Roots</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: { 50:'#fdf8f0', 100:'#f7eed8', 200:'#eedfc0', 300:'#e0c99a' },
            bark:      { 700:'#5c3d1e', 800:'#3d2810', 900:'#261808' },
            moss:      { 400:'#7aad5a', 600:'#4a7c35', 700:'#345c24', 800:'#1e3a14' },
            soil:      { 600:'#8b6340', 700:'#6b4a28', 800:'#4a3018' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../styles/roots.css">
  
</head>
<body>
<div id="navbar-root"></div>
<div id="app-root" class="min-h-screen"></div>
<div id="footer-root"></div>
<div id="toggle-root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="../scripts/shared-components.js"></script>
<script>
var e             = React.createElement;
var useState      = React.useState;
var StoreProvider = RootsStore.StoreProvider;
var useStore      = RootsStore.useStore;

function WishlistApp() {
  var store = useStore();
  var wishlist            = store.wishlist;
  var addToCart           = store.addToCart;
  var removeFromWishlist  = store.removeFromWishlist;
  var movedState = useState(null);
  var movedId    = movedState[0];
  var setMovedId = movedState[1];

  function moveToCart(item) {
    addToCart(item, 1);
    setMovedId(item.id);
    setTimeout(function() {
      removeFromWishlist(item.id);
      setMovedId(null);
    }, 900);
  }

  if (wishlist.length === 0) {
    return e('div', { className: 'max-w-2xl mx-auto px-4 py-24 text-center' },
      e('div', { className: 'w-20 h-20 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-3xl font-black text-gray-600 mx-auto mb-6' }, '*'),
      e('h2', { className: 'text-2xl font-black text-white mb-2' }, 'Your wishlist is empty'),
      e('p', { className: 'text-gray-400 mb-8' }, 'Save items while browsing products — click the star on any product card.'),
      e('a', { href: 'produce_products.html', className: 'inline-block bg-green-800 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-xl transition-colors' }, 'Browse Products')
    );
  }

  return e('div', { className: 'max-w-2xl mx-auto px-4 sm:px-6 py-10' },
    e('div', { className: 'flex items-center justify-between mb-8' },
      e('h1', { className: 'text-3xl font-black text-white' }, 'My Wishlist'),
      e('a', { href: 'cart.html', className: 'text-sm text-green-400 hover:underline' }, 'View Cart')
    ),
    e('div', { className: 'flex flex-col gap-3' },
      wishlist.map(function(item) {
        var isMoved = movedId === item.id;
        return e('div', { key: item.id, className: 'bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4 hover:border-white/20 transition-colors' },
          e('div', { className: 'flex-1 min-w-0' },
            e('p', { className: 'text-sm font-semibold text-white truncate' }, item.name),
            e('p', { className: 'text-green-400 font-black text-base mt-0.5' }, 'R' + parseFloat(item.price).toFixed(2))
          ),
          e('div', { className: 'flex gap-2 shrink-0' },
            e('button', {
              onClick: function() { moveToCart(item); },
              className: 'px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-wide transition-all ' +
                (isMoved ? 'bg-green-700 text-white' : 'bg-green-800 text-white hover:bg-green-700')
            }, isMoved ? 'Added!' : 'Add to Cart'),
            e('button', {
              onClick: function() { removeFromWishlist(item.id); },
              className: 'w-8 h-8 flex items-center justify-center rounded-lg text-gray-600 hover:text-red-400 hover:bg-red-400/10 transition-colors text-sm',
              title: 'Remove'
            }, 'x')
          )
        );
      })
    )
  );
}

var navRoot    = document.getElementById('navbar-root');
var footRoot   = document.getElementById('footer-root');
var toggleRoot = document.getElementById('toggle-root');

ReactDOM.createRoot(document.getElementById('app-root')).render(
  e(StoreProvider, null,
    e(RootsComponents.ScrollGradient),
    ReactDOM.createPortal(e(RootsComponents.Navbar),        navRoot),
    ReactDOM.createPortal(e(RootsComponents.Footer),        footRoot),
    ReactDOM.createPortal(e(RootsComponents.LowDataToggle), toggleRoot),
    e(RootsComponents.RevealObserver),
    e(RootsComponents.ParallaxHandler),
    e(WishlistApp)
  )
);
</script>
</body>
</html>
