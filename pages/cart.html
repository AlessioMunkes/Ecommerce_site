<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart — Roots</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            parchment: { 50:'#fdf8f0', 100:'#f7eed8', 200:'#eedfc0', 300:'#e0c99a' },
            bark:      { 700:'#5c3d1e', 800:'#3d2810', 900:'#261808' },
            moss:      { 400:'#7aad5a', 600:'#4a7c35', 700:'#345c24', 800:'#1e3a14' },
            soil:      { 600:'#8b6340', 700:'#6b4a28', 800:'#4a3018' },
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="../styles/roots.css">
  
</head>
<body>
<div id="navbar-root"></div>
<div id="app-root" class="min-h-screen"></div>
<div id="footer-root"></div>
<div id="toggle-root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="../scripts/shared-components.js"></script>
<script>
var e             = React.createElement;
var StoreProvider = RootsStore.StoreProvider;
var useStore      = RootsStore.useStore;

function CartApp() {
  var store = useStore();
  var cart       = store.cart;
  var cartTotal  = store.cartTotal;
  var removeFromCart = store.removeFromCart;
  var setQty         = store.setQty;
  var clearCart      = store.clearCart;

  if (cart.length === 0) {
    return e('div', { className: 'max-w-2xl mx-auto px-4 py-24 text-center' },
      e('div', { className: 'w-20 h-20 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-3xl font-black text-gray-600 mx-auto mb-6' }, '0'),
      e('h2', { className: 'text-2xl font-black text-white mb-2' }, 'Your cart is empty'),
      e('p', { className: 'text-gray-400 mb-8' }, 'Add some community-grown products to get started.'),
      e('a', { href: 'produce_products.html', className: 'inline-block bg-green-800 hover:bg-green-700 text-white font-bold px-8 py-3 rounded-xl transition-colors' }, 'Browse Products')
    );
  }

  return e('div', { className: 'max-w-2xl mx-auto px-4 sm:px-6 py-10' },
    e('h1', { className: 'text-3xl font-black text-white mb-8' }, 'Shopping Cart'),
    /* Items */
    e('div', { className: 'flex flex-col gap-3 mb-6' },
      cart.map(function(item) {
        var lineTotal = (item.price * item.qty).toFixed(2);
        return e('div', { key: item.id, className: 'bg-white/5 border border-white/10 rounded-2xl p-4 flex items-center gap-4 hover:border-white/20 transition-colors' },
          e('div', { className: 'flex-1 min-w-0' },
            e('p', { className: 'text-sm font-semibold text-white truncate' }, item.name),
            e('p', { className: 'text-xs text-gray-400 mt-0.5' }, 'R' + parseFloat(item.price).toFixed(2) + ' each')
          ),
          e('div', { className: 'flex items-center rounded-xl overflow-hidden border border-white/15 bg-white/5 shrink-0' },
            e('button', {
              onClick: function() { item.qty <= 1 ? removeFromCart(item.id) : setQty(item.id, item.qty - 1); },
              className: 'w-8 h-8 flex items-center justify-center text-gray-300 hover:bg-green-400/15 hover:text-green-400 transition-colors font-bold text-lg'
            }, '-'),
            e('span', { className: 'w-8 text-center text-sm font-bold text-white border-x border-white/10 leading-8' }, item.qty),
            e('button', {
              onClick: function() { setQty(item.id, item.qty + 1); },
              className: 'w-8 h-8 flex items-center justify-center text-gray-300 hover:bg-green-400/15 hover:text-green-400 transition-colors font-bold text-lg'
            }, '+')
          ),
          e('span', { className: 'text-sm font-black text-green-400 w-16 text-right shrink-0' }, 'R' + lineTotal),
          e('button', {
            onClick: function() { removeFromCart(item.id); },
            className: 'w-7 h-7 flex items-center justify-center rounded-lg text-gray-600 hover:text-red-400 hover:bg-red-400/10 transition-colors text-sm shrink-0',
            title: 'Remove'
          }, 'x')
        );
      })
    ),
    /* Summary */
    e('div', { className: 'bg-white/5 border border-white/10 rounded-2xl p-5' },
      e('div', { className: 'flex justify-between text-sm text-gray-400 mb-2' },
        e('span', null, 'Subtotal'), e('span', null, 'R' + cartTotal.toFixed(2))
      ),
      e('div', { className: 'flex justify-between font-black text-white text-lg border-t border-white/10 pt-3 mt-3' },
        e('span', null, 'Total'), e('span', { className: 'text-green-400' }, 'R' + cartTotal.toFixed(2))
      ),
      e('div', { className: 'flex gap-3 mt-5' },
        e('button', {
          onClick: clearCart,
          className: 'flex-1 py-3 rounded-xl border border-red-400/30 text-red-400 text-sm font-bold hover:bg-red-400/10 transition-colors'
        }, 'Clear Cart'),
        e('a', {
          href: 'checkout.html',
          className: 'flex-1 py-3 rounded-xl bg-green-800 hover:bg-green-700 text-white text-sm font-bold text-center transition-colors'
        }, 'Checkout')
      )
    )
  );
}

var navRoot    = document.getElementById('navbar-root');
var footRoot   = document.getElementById('footer-root');
var toggleRoot = document.getElementById('toggle-root');

ReactDOM.createRoot(document.getElementById('app-root')).render(
  e(StoreProvider, null,
    e(RootsComponents.ScrollGradient),
    ReactDOM.createPortal(e(RootsComponents.Navbar),        navRoot),
    ReactDOM.createPortal(e(RootsComponents.Footer),        footRoot),
    ReactDOM.createPortal(e(RootsComponents.LowDataToggle), toggleRoot),
    e(RootsComponents.RevealObserver),
    e(RootsComponents.ParallaxHandler),
    e(CartApp)
  )
);
</script>
</body>
</html>
